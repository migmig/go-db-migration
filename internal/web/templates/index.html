<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --success-hover: #059669;
            --danger-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-success:hover:not(:disabled) {
            background-color: var(--success-hover);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #table-section, #progress-section {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            background-color: var(--bg-color);
            margin-bottom: 1rem;
        }

        .table-item {
            padding: 0.5rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .table-item:hover {
            background-color: var(--card-bg);
        }

        .table-item input[type="checkbox"] {
            margin-right: 0.75rem;
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        .table-item label {
            margin-bottom: 0;
            cursor: pointer;
            width: 100%;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
        }
        .checkbox-container input {
            margin-right: 0.75rem;
            width: 1.1rem;
            height: 1.1rem;
            accent-color: var(--primary-color);
            cursor: pointer;
        }
        .checkbox-container label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .progress-container {
            margin-bottom: 1.25rem;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: var(--radius-md);
            background-color: var(--bg-color);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .progress-title {
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-bar-bg {
            background-color: var(--border-color);
            height: 12px;
            width: 100%;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        #download-btn {
            display: none;
            margin-top: 1.5rem;
        }

        .error-msg {
            color: var(--danger-color);
            margin-top: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }

        .warning-banner {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .session-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
<div class="session-info">Session ID: <span id="currentSessionId">{{ .sessionId }}</span></div>
<div class="container">
    <h1>{{ .title }}</h1>

    <div id="conn-section" class="card">
        <h2>1. Oracle DB Connection</h2>
        <div class="form-group">
            <label for="oracleUrl">Oracle URL</label>
            <input type="text" id="oracleUrl" placeholder="localhost:1521/XE" required>
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1.25rem;">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
        </div>
        <div class="form-group">
            <label for="likeQuery">Table Filter (LIKE)</label>
            <input type="text" id="likeQuery" placeholder="e.g. USERS_%">
        </div>
        <button id="btn-connect" class="btn-primary">Connect & Fetch Tables</button>
        <div id="conn-error" class="error-msg"></div>
    </div>

    <div id="table-section" class="card">
        <h2>2. Select Tables & Migration Mode</h2>
        <div class="checkbox-container">
            <input type="checkbox" id="checkAll">
            <label for="checkAll">Select All Tables</label>
        </div>
        <div class="table-list" id="tableList">
            <!-- Tables will be injected here -->
        </div>

        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <details style="margin-bottom: 1rem; cursor: pointer;">
                <summary style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Advanced Settings</summary>
                <div style="padding: 1rem; background: var(--bg-color); border-radius: var(--radius-md);">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="targetDb">출력 대상 DB (Target DB)</label>
                        <select id="targetDb" onchange="handleTargetDbChange()" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 0.9rem;">
                            <option value="postgres" selected>PostgreSQL</option>
                            <option value="mysql">MySQL</option>
                            <option value="mariadb">MariaDB</option>
                            <option value="sqlite">SQLite</option>
                            <option value="mssql">MSSQL (SQL Server)</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 0.75rem;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label for="batchSize">Batch Size</label>
                            <input type="text" id="batchSize" value="1000">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label for="workers">Parallel Workers</label>
                            <input type="text" id="workers" value="4">
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 0.75rem;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label for="dbMaxOpen" style="font-size:0.8rem;" title="DB Max Open Connections (0=Unlimited)">DB Max Open</label>
                            <input type="text" id="dbMaxOpen" value="0">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label for="dbMaxIdle" style="font-size:0.8rem;" title="DB Max Idle Connections">DB Max Idle</label>
                            <input type="text" id="dbMaxIdle" value="2">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label for="dbMaxLife" style="font-size:0.8rem;" title="DB Conn Max Lifetime in seconds (0=Unlimited)">DB Max Life (s)</label>
                            <input type="text" id="dbMaxLife" value="0">
                        </div>
                    </div>
                    <hr style="margin: 0.75rem 0; border: none; border-top: 1px solid var(--border-color);">
                    <div id="sql-only-controls">
                        <div style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <label for="outFile">Output Filename</label>
                                <input type="text" id="outFile" value="migration.sql">
                            </div>
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <label for="schema">Schema</label>
                                <input type="text" id="schema" placeholder="public">
                            </div>
                        </div>
                        <div style="display: flex; gap: 2rem;">
                            <div class="checkbox-container" style="margin-bottom: 0;">
                                <input type="checkbox" id="perTable" checked>
                                <label for="perTable">Per-Table File Output</label>
                            </div>
                            <div class="checkbox-container" style="margin-bottom: 0;">
                                <input type="checkbox" id="logJson">
                                <label for="logJson">JSON Logging</label>
                            </div>
                        </div>
                    </div>
                    
                    <hr style="margin: 0.75rem 0; border: none; border-top: 1px solid var(--border-color);">
                    <div id="ddl-settings">
                        <div class="checkbox-container">
                            <input type="checkbox" id="withDdl" checked>
                            <label for="withDdl">Generate/Execute CREATE TABLE (DDL)</label>
                        </div>
                        <div id="ddlSubOptions" style="padding-left: 1.5rem; display: block;">
                            <div class="checkbox-container" style="margin-bottom: 0.5rem;">
                                <input type="checkbox" id="withSequences" disabled>
                                <label for="withSequences" style="color: var(--text-muted);">Sequence DDL 포함 (--with-sequences)</label>
                            </div>
                            <div class="checkbox-container" style="margin-bottom: 0.5rem;">
                                <input type="checkbox" id="withIndexes" disabled>
                                <label for="withIndexes" style="color: var(--text-muted);">Index DDL 포함 (--with-indexes)</label>
                            </div>
                            <div class="checkbox-container" style="margin-bottom: 0.75rem;">
                                <input type="checkbox" id="withConstraints" disabled>
                                <label for="withConstraints" style="color: var(--text-muted);">제약조건(Default, FK, Check) 포함 (--with-constraints)</label>
                            </div>
                            <div class="form-group" style="margin-bottom: 0.75rem;">
                                <label for="oracleOwner">Oracle 소유자</label>
                                <input type="text" id="oracleOwner" placeholder="접속 계정과 동일" style="font-size:0.9rem;">
                            </div>
                        </div>
                    </div>
                </div>
            </details>

            <div class="checkbox-container" style="margin-bottom: 1rem;">
                <input type="checkbox" id="directMigration">
                <label for="directMigration" id="directMigrationLabel">Direct Migration to Target DB (No SQL files)</label>
            </div>
            
            <div id="pg-config" style="display: none; animation: fadeIn 0.3s ease-in-out;">
                <div class="form-group">
                    <label for="pgUrl" id="targetUrlLabel">Target URL</label>
                    <input type="text" id="pgUrl" placeholder="postgres://user:pass@host:port/dbname">
                </div>
            </div>
        </div>

        <div class="checkbox-container" style="margin-top: 1.5rem; margin-bottom: 0;">
            <input type="checkbox" id="dryRun">
            <label for="dryRun">Dry-Run (Verify connectivity &amp; estimate row counts only)</label>
        </div>
        <button id="btn-migrate" class="btn-success" style="margin-top: 1rem;">Start Migration</button>
        <div id="migrate-error" class="error-msg"></div>
    </div>

    <div id="progress-section" class="card">
        <h2 id="progress-title">3. Migration Progress</h2>
        <div id="progress-container">
            <!-- Progress bars will be injected here -->
        </div>
        <button id="download-btn" class="btn-primary" onclick="downloadZipArchive()">
            <svg style="width:20px;height:20px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Download ZIP Archive
        </button>
    </div>
</div>

<script>
    const btnConnect = document.getElementById('btn-connect');
    const btnMigrate = document.getElementById('btn-migrate');
    const checkAll = document.getElementById('checkAll');
    const directMigration = document.getElementById('directMigration');
    const pgConfig = document.getElementById('pg-config');
    const downloadBtn = document.getElementById('download-btn');
    const dryRunCb = document.getElementById('dryRun');
    const sqlOnlyControls = document.getElementById('sql-only-controls');
    let ws;
    let currentZipId = '';
    let isDryRunMode = false;
    const sessionId = document.getElementById('currentSessionId').innerText;

    directMigration.addEventListener('change', (e) => {
        pgConfig.style.display = e.target.checked ? 'block' : 'none';
        sqlOnlyControls.style.display = e.target.checked ? 'none' : 'block';
    });

    function handleTargetDbChange() {
        const targetDb = document.getElementById('targetDb').value;
        const pgUrlInput = document.getElementById('pgUrl');
        const schemaInput = document.getElementById('schema');
        const withSequencesCb = document.getElementById('withSequences');

        switch (targetDb) {
            case 'postgres':
                pgUrlInput.placeholder = "postgres://user:pass@host:5432/dbname";
                schemaInput.parentElement.style.display = 'block';
                withSequencesCb.disabled = false;
                withSequencesCb.title = "";
                break;
            case 'mysql':
            case 'mariadb':
                pgUrlInput.placeholder = "user:pass@tcp(host:3306)/dbname";
                schemaInput.parentElement.style.display = 'block';
                withSequencesCb.checked = false;
                withSequencesCb.disabled = true;
                withSequencesCb.title = "MySQL/MariaDB doesn't support sequences (use AUTO_INCREMENT)";
                break;
            case 'sqlite':
                pgUrlInput.placeholder = "/path/to/file.db";
                schemaInput.parentElement.style.display = 'none';
                withSequencesCb.checked = false;
                withSequencesCb.disabled = true;
                withSequencesCb.title = "SQLite doesn't support sequences";
                break;
            case 'mssql':
                pgUrlInput.placeholder = "sqlserver://user:pass@host:1433?database=dbname";
                schemaInput.parentElement.style.display = 'block';
                withSequencesCb.disabled = false;
                withSequencesCb.title = "";
                break;
        }
    }

    document.getElementById('withDdl').addEventListener('change', function(e) {
        const ddlSubOptions = document.getElementById('ddlSubOptions');
        const withSeq = document.getElementById('withSequences');
        const withIdx = document.getElementById('withIndexes');
        const withCons = document.getElementById('withConstraints');
        const oracleOwner = document.getElementById('oracleOwner');
        const seqLabel = document.querySelector('label[for="withSequences"]');
        const idxLabel = document.querySelector('label[for="withIndexes"]');
        const consLabel = document.querySelector('label[for="withConstraints"]');
        
        if (this.checked) {
            ddlSubOptions.style.display = 'block';
            withSeq.disabled = false;
            withIdx.disabled = false;
            withCons.disabled = false;
            seqLabel.style.color = '';
            idxLabel.style.color = '';
            consLabel.style.color = '';
        } else {
            ddlSubOptions.style.display = 'none';
            withSeq.checked = false;
            withIdx.checked = false;
            withCons.checked = false;
            oracleOwner.value = '';
            withSeq.disabled = true;
            withIdx.disabled = true;
            withCons.disabled = true;
            seqLabel.style.color = 'var(--text-muted)';
            idxLabel.style.color = 'var(--text-muted)';
            consLabel.style.color = 'var(--text-muted)';
        }
    });

    dryRunCb.addEventListener('change', (e) => {
        btnMigrate.innerText = e.target.checked ? 'Run Verification' : 'Start Migration';
    });

    btnConnect.addEventListener('click', async () => {
        const oracleUrl = document.getElementById('oracleUrl').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const likeQuery = document.getElementById('likeQuery').value;
        const errorDiv = document.getElementById('conn-error');
        errorDiv.innerText = '';

        if (!oracleUrl || !username || !password) {
            errorDiv.innerText = 'Please fill in all required fields.';
            return;
        }

        btnConnect.disabled = true;
        btnConnect.innerHTML = '<span style="opacity:0.8;">Connecting...</span>';

        try {
            const res = await fetch('/api/tables', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oracleUrl, username, password, like: likeQuery })
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Failed to fetch tables');
            }

            renderTableList(data.tables || []);
            document.getElementById('table-section').style.display = 'block';
            document.getElementById('progress-section').style.display = 'none';
            downloadBtn.style.display = 'none';

            // Smooth scroll to tables
            document.getElementById('table-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch (err) {
            errorDiv.innerText = err.message;
        } finally {
            btnConnect.disabled = false;
            btnConnect.innerText = 'Connect & Fetch Tables';
        }
    });

    function renderTableList(tables) {
        const listDiv = document.getElementById('tableList');
        listDiv.innerHTML = '';
        checkAll.checked = false;

        if (tables.length === 0) {
            listDiv.innerHTML = '<div style="padding: 1rem; color: var(--text-muted); text-align: center;">No tables found matching criteria.</div>';
            return;
        }

        tables.forEach(table => {
            const div = document.createElement('div');
            div.className = 'table-item';
            div.innerHTML = `
                    <input type="checkbox" class="table-cb" id="cb-${table}" value="${table}">
                    <label for="cb-${table}">${table}</label>
                `;
            listDiv.appendChild(div);
        });
    }

    checkAll.addEventListener('change', (e) => {
        const cbs = document.querySelectorAll('.table-cb');
        cbs.forEach(cb => cb.checked = e.target.checked);
    });

    btnMigrate.addEventListener('click', async () => {
        const cbs = document.querySelectorAll('.table-cb:checked');
        const selectedTables = Array.from(cbs).map(cb => cb.value);
        const errorDiv = document.getElementById('migrate-error');
        errorDiv.innerText = '';

        if (selectedTables.length === 0) {
            errorDiv.innerText = 'Please select at least one table.';
            return;
        }

        const oracleUrl = document.getElementById('oracleUrl').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        const isDirect = directMigration.checked;
        const targetDb = document.getElementById('targetDb').value;
        const targetUrl = document.getElementById('pgUrl').value.trim();
        const withDdl = document.getElementById('withDdl').checked;
        const batchSize = parseInt(document.getElementById('batchSize').value) || 1000;
        const workers = parseInt(document.getElementById('workers').value) || 4;
        const outFile = document.getElementById('outFile').value || 'migration.sql';
        const perTable = document.getElementById('perTable').checked;
        const schema = document.getElementById('schema').value;
        const dryRun = dryRunCb.checked;
        const logJson = document.getElementById('logJson').checked;
        const withSequences = document.getElementById('withSequences').checked;
        const withIndexes = document.getElementById('withIndexes').checked;
        const withConstraints = document.getElementById('withConstraints').checked;
        const oracleOwner = document.getElementById('oracleOwner').value;
        const dbMaxOpen = parseInt(document.getElementById('dbMaxOpen').value) || 0;
        const dbMaxIdle = parseInt(document.getElementById('dbMaxIdle').value) || 2;
        const dbMaxLife = parseInt(document.getElementById('dbMaxLife').value) || 0;

        isDryRunMode = dryRun;

        if (isDirect && !targetUrl) {
            errorDiv.innerText = 'Please provide a Target DB connection URL for direct migration.';
            return;
        }

        // Setup WebSocket
        setupWebSocket();

        // Clear previous progress
        document.getElementById('progress-container').innerHTML = '';
        document.getElementById('progress-section').style.display = 'block';
        document.getElementById('progress-title').innerText = dryRun
            ? '3. Verification Results (Dry-Run)'
            : '3. Migration Progress';
        downloadBtn.style.display = 'none';
        btnMigrate.disabled = true;
        btnMigrate.innerHTML = `<span style="opacity:0.8;">${dryRun ? 'Verifying...' : 'Migration Running...'}</span>`;

        document.getElementById('progress-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        try {
            const res = await fetch('/api/migrate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: sessionId,
                    oracleUrl,
                    username,
                    password,
                    tables: selectedTables,
                    direct: isDirect,
                    targetDb: targetDb,
                    targetUrl: targetUrl,
                    pgUrl: targetUrl, // backward compatibility just in case
                    withDdl: withDdl,
                    batchSize: batchSize,
                    workers: workers,
                    outFile: outFile,
                    perTable: perTable,
                    schema: schema,
                    dryRun: dryRun,
                    logJson: logJson,
                    withSequences: withSequences,
                    withIndexes: withIndexes,
                    withConstraints: withConstraints,
                    oracleOwner: oracleOwner,
                    dbMaxOpen: dbMaxOpen,
                    dbMaxIdle: dbMaxIdle,
                    dbMaxLife: dbMaxLife
                })
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Failed to start migration');
            }
        } catch (err) {
            errorDiv.innerText = err.message;
            btnMigrate.disabled = false;
            btnMigrate.innerText = 'Start Migration';
        }
    });

    function setupWebSocket() {
        if (ws) {
            ws.close();
        }
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;
        ws = new WebSocket(`${protocol}//${host}/api/progress?sessionId=${sessionId}`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            handleProgressMessage(msg);
        };

        ws.onerror = (err) => {
            console.error("WebSocket error:", err);
        };
    }

    const tableProgressData = {};
    const shownWarnings = new Set();

    function showWarningBanner(message) {
        if (shownWarnings.has(message)) return;
        shownWarnings.add(message);

        const container = document.getElementById('progress-container');
        const banner = document.createElement('div');
        banner.className = 'warning-banner';
        banner.textContent = '⚠ ' + message;
        container.insertBefore(banner, container.firstChild);
    }

    function handleProgressMessage(msg) {
        const container = document.getElementById('progress-container');

        if (msg.type === 'warning') {
            showWarningBanner(msg.message);
            return;
        }

        if (msg.type === 'all_done') {
            currentZipId = msg.zip_file_id;
            if (currentZipId && !isDryRunMode) {
                downloadBtn.style.display = 'flex';
            } else {
                downloadBtn.style.display = 'none';
            }
            btnMigrate.disabled = false;
            btnMigrate.innerText = isDryRunMode ? 'Run Verification' : 'Start Migration';
            return;
        }

        if (msg.type === 'ddl_progress') {
            const itemId = `ddl-${msg.object}-${msg.object_name}`;
            let item = document.getElementById(itemId);
            if (!item) {
                item = document.createElement('div');
                item.id = itemId;
                item.style.cssText = 'padding:0.4rem 0.75rem; font-size:0.875rem; font-family:monospace; border-radius:4px; margin-bottom:4px; background:var(--bg-color);';
                container.appendChild(item);
            }
            const okIcon = `<svg style="width:13px;height:13px;vertical-align:middle;margin-right:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            const errIcon = `<svg style="width:13px;height:13px;vertical-align:middle;margin-right:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            if (msg.status === 'ok') {
                item.style.color = 'var(--success-color)';
                item.innerHTML = `${okIcon}[${msg.object}] ${msg.object_name}`;
            } else {
                item.style.color = 'var(--danger-color)';
                item.innerHTML = `${errIcon}[${msg.object}] ${msg.object_name} — ${msg.error || 'error'}`;
            }
            return;
        }

        if (msg.type === 'dry_run_result') {
            let wrapper = document.getElementById(`prog-${msg.table}`);
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.id = `prog-${msg.table}`;
                wrapper.className = 'progress-container';
                container.appendChild(wrapper);
            }
            const okIcon = `<svg style="width:14px;height:14px;vertical-align:middle" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            const errIcon = `<svg style="width:14px;height:14px;vertical-align:middle" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            const color = msg.connection_ok ? 'var(--success-color)' : 'var(--danger-color)';
            const icon = msg.connection_ok ? okIcon : errIcon;
            const status = msg.connection_ok ? 'OK' : 'FAILED';
            wrapper.innerHTML = `
                <div class="progress-header">
                    <span class="progress-title">${msg.table}</span>
                    <span style="color:${color};font-weight:600;font-size:0.875rem">${icon} ${status} — ~${msg.total.toLocaleString()} rows</span>
                </div>
            `;
            if (!msg.connection_ok) {
                showWarningBanner('대상 DB 연결에 실패했습니다. URL을 확인해 주세요.');
            }
            return;
        }

        let wrapper = document.getElementById(`prog-${msg.table}`);
        if (!wrapper && msg.table) {
            wrapper = document.createElement('div');
            wrapper.id = `prog-${msg.table}`;
            wrapper.className = 'progress-container';
            wrapper.innerHTML = `
                    <div class="progress-header">
                        <span class="progress-title">${msg.table}</span>
                        <span id="prog-text-${msg.table}" class="progress-text">Initializing...</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="prog-fill-${msg.table}" class="progress-bar-fill"></div>
                    </div>
                `;
            container.appendChild(wrapper);
            tableProgressData[msg.table] = { total: 0, count: 0 };
        }

        if (msg.type === 'init') {
            tableProgressData[msg.table].total = msg.total || 0;
            updateProgressUI(msg.table);
        } else if (msg.type === 'update') {
            tableProgressData[msg.table].count = msg.count || 0;
            updateProgressUI(msg.table);
        } else if (msg.type === 'done') {
            const data = tableProgressData[msg.table];
            data.count = data.total; // ensure 100%
            updateProgressUI(msg.table);

            const fill = document.getElementById(`prog-fill-${msg.table}`);
            fill.style.backgroundColor = 'var(--success-color)';
            document.getElementById(`prog-text-${msg.table}`).innerHTML = `
                    <svg style="width:14px;height:14px;vertical-align:middle;margin-right:2px;color:var(--success-color)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span style="color:var(--success-color);font-weight:600">COMPLETED</span>
                `;
        } else if (msg.type === 'error') {
            const fill = document.getElementById(`prog-fill-${msg.table}`);
            fill.style.backgroundColor = 'var(--danger-color)';
            fill.style.width = '100%';
            document.getElementById(`prog-text-${msg.table}`).innerHTML = `
                    <span style="color:var(--danger-color);font-weight:600">ERROR</span>: ${msg.error}
                `;
        }
    }

    function updateProgressUI(tableName) {
        const data = tableProgressData[tableName];
        const fill = document.getElementById(`prog-fill-${tableName}`);
        const text = document.getElementById(`prog-text-${tableName}`);

        if (!fill || !text) return;

        let pct = 0;
        if (data.total > 0) {
            pct = Math.min(100, Math.floor((data.count / data.total) * 100));
        } else if (data.count > 0 && data.total === 0) {
            // Unknown total case
            pct = 100;
        }

        fill.style.width = `${pct}%`;
        // Only update text if it hasn't been marked completed or error
        if (!text.innerHTML.includes('COMPLETED') && !text.innerHTML.includes('ERROR')) {
            text.innerText = `${pct}% (${data.count.toLocaleString()} / ${data.total.toLocaleString()} rows)`;
        }
    }

    function downloadZipArchive() {
        if (currentZipId) {
            window.location.href = `/api/download/${currentZipId}`;
        }
    }
</script>
</body>
</html>
