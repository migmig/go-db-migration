<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DBMigrator Frontend Bundle Missing</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, #d9efff 0%, transparent 45%),
          radial-gradient(circle at top right, #ffe7d2 0%, transparent 38%),
          #f6f9fc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 720px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid #d8e1ea;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      code {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #eaf2ff;
        color: #1447a6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>frontend bundle is not embedded in this binary.</h1>
      <p>Build the offline binary with <code>make offline</code>.</p>
      <p>The offline build bundles the React frontend into the Go executable, so runtime does not require <code>frontend/dist</code>, Node, or network access.</p>
    </main>
  </body>
</html>
